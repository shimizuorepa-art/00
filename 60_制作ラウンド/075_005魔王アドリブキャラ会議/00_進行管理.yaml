  type: "差し込み相談"
  summary:
    - "005にも微調整が必要。まだ魔王と決まっていない山野がいるのは変なので山野本人はカットする。"
    - "005終盤は、目を惹く黒い出立ちの人外っぽい男を残高不足の魔王にし、山野をアテる案を思いつく流れにする。"
    - "魔王は原作改変版にもいない、アドリブの局地として扱う。"
    - "高瀬は便利にしすぎず、指示を考えて他スタッフへナイスパスを回し、以降は伝書鳩的な立ち回りにする。"
    - "痛み方向の語彙は置き、ポジティブアクションと働くドラマで進める。"

outputs:
