project:
  name: "AIライター室"
  mode: "半自動ライティング"
  current_focus: "第1章完走・GitHubアップ完了"
  owner_bridge: "補佐くん"
  updated_at: "2026-05-28"
  premise:
    original_genre: "恋愛コメディ"
    adaptation_condition: "原作通りに作らないこと"
    story_axis: "原作者の後出し改変に振り回される映像化現場の悲哀と破綻を、各人物が自分の役回りで受け止めていく群像劇"

policy:
  dispatch_body_format: "markdown"
  progress_tracking_format: "yaml"
  chapter_unit:
    default_episode_count: 10
    owner_review: "chapter_level"
    owner_inputs:
      - "この章で描きたいこと"
      - "章末で到達したい状態"
      - "絶対入れたい出来事・台詞・感情"
      - "やりすぎたくない要素"
    team_decides:
      - "章内10話の役割分担"
      - "各話の開始点と終了点"
      - "場面継続・転換"
      - "各話の切りどころ"
      - "会話や余韻を次話へ回す判断"
    episode_cut_rule: "1話につき必ず何かを1つ変え、変わったら切る"
  prologue_unit:
    status: "completed"
    owner_approved: true
    finalized_at: "2026-05-27"
    included_in_chapter_count: false
    completed_episodes:
      - "001_雨がやむまで"
      - "002_帰るための言葉"
      - "003_馬車できた"
      - "004_カット"
      - "005_鳥車"
    goal:
      - "導入"
      - "異世界らしさ"
      - "劇中劇のカット後の主要登場人物顔見せ"
    required_elements:
      - "異世界導入の核として「馬車で」を残す"
      - "唐突な現実破綻として扱う"
      - "原作者が映像化をコケにしている感じを出す"
      - "原作は恋愛コメディだが、映像化条件が「原作通りに作らないこと」である"
      - "原作者の後出し改変が、現場の脚本・演出・制作・演技を破綻へ巻き込む"
      - "劇中の悠人が「電車が事故で止まっててさ。馬車で来た」と軽く言い、配車・バス・馬車が混ざる感触で扱う"
      - "コンビニ魔王店長をプロローグで顔見せする"
    next_phase_after_completion: "第1章"
  subagent_required_for:
    - "章構成メモ"
    - "各話構成メモ"
    - "原作案"
    - "考証メモ"
    - "脚本ドラフト"
    - "肯定レビュー"
    - "否定レビュー"
    - "統合編集レビュー"
  close_subagent_after_completion: true
  fallback_draft_label: "補佐くん仮稿"

