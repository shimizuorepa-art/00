project:
  name: "AIライター室"
  mode: "半自動ライティング"
  current_focus: "086_010『確定が届く』を完了。006〜010再制作の区切りまで到達"
  owner_bridge: "補佐くん"
  updated_at: "2026-05-30"
  premise:
    original_genre: "恋愛コメディ"
    adaptation_condition: "原作通りに作らないこと"
    story_axis: "恋愛コメディ原作を、原作通りにしない映像化オーダーと原作者のAI発想が異世界混入へ魔改造し、その加工済み映像に演者と制作陣が振り回される群像劇"
    fantasy_rule: "異世界要素は原作では普通ではない。鳴海千景が映像化にあたりAI案も混ぜながら盛ってくる。"
    prologue_reveal: "新プロローグ終盤は撮影現場そのものではなく、CG加工済み映像のモニターチェックへ反転する。演者は台本上では知っていたが、画になった盛られ方に驚く。"
    actor_gap: "演者側には、原作通りの恋愛コメディに出るつもりで来た戸惑いを置く。後続でオーディション当時の場面を膨らませる。"

policy:
  dispatch_body_format: "markdown"
  progress_tracking_format: "yaml"
  current_workflow: "character_driven_lightweight"
  archive:
    old_15_episodes:
      status: "archived_as_outline_material"
      archived_at: "2026-05-29"
      path: "20_校了品/99_アーカイブ/2026-05-29_旧15話_工程再設計前"
      rule: "骨子、出来事、人物配置、使えそうな台詞の参照材料。本文は採用済み正本として扱わない。"
  chapter_unit:
    default_episode_count: 10
    owner_review: "chapter_level"
    episode_cut_rule: "1話につき何かを1つ変え、変わったら切る"
    pre_chapter_flow:
      - "章末人物更新"
      - "キャラ会議"
      - "章構成メモ"
    per_episode_outputs:
      - "00_発注カード.md"
      - "01_設計メモ.md"
      - "02_本文初稿.md"
      - "03_文体調整.md"
      - "04_編集確認.md"
      - "05_完成稿.md"
  character_meeting:
    agent_path: "10_役割別作業場/11_キャラ会議/agent.md"
    participants_per_chapter: "2〜3人"
    role: "章を決定せず、欲しいもの、避けたいこと、噛み合わなさ、関係の火種を渡す"
    rotation_rule:
      - "同じ組み合わせは最低3章あける"
      - "前章で変化した人を1人入れる"
      - "まだ会議で喋っていない人を1人入れる"
      - "制作側、役者側、原作者に偏りすぎない"
  character_profiles:
    canonical_source: "10_役割別作業場/00_共通資料_登場人物深掘り"
    read_rule: "章骨子を作る段階で最新正本と相関図を読む。各話制作ではキャラ会議、章構成メモ、発注カードを主資料にする。"
    update_rule: "章末ごとに変わった人間関係とキャラ設定を章末人物更新へ残し、採用済みのみ正本反映する。"
  subagent_dispatch:
    template: "00_運用管理/サブエージェント軽量発注テンプレート.md"
    rule: "発注はチェックリストではなく、何をよくするか、どこを任せるか、何を寝かせるかを短く渡す。"
    sections:
      - "今回の仕事"
      - "受け取る材料"
      - "変えるもの"
      - "任せること"
      - "寝かせるもの"
      - "出力"
    material_groups:
      - "主要入力"
      - "補助資料"
      - "必要なら見る"
    max_sleep_items: 3
    avoid_overuse:
      - "禁止"
      - "必ず"
      - "漏れなく"
    read_rule: "章骨子後の各話制作では、人物深掘り正本を毎回フルで読ませず、章構成メモ、キャラ会議、発注カードを主資料にする。"
  lightweight_roles:
    rule: "各工程agent.mdは5つのポジティブな仕事を中心にする。長い禁止事項と常時チェックリストは置かない。"
    optional_subagents:
      - "考証"
      - "演出"
      - "読者視点"
      - "整合性管理"
      - "プロデューサー"
      - "肯定レビュー"
      - "否定レビュー"
    optional_rule: "重要回、設定追加回、迷った回だけ差し込む。考証は章骨子と設計メモに吸収し、必要時だけ独立発注する。"
  style_rewrite:
    output: "03_文体調整.md"
    rule: "文体は救急車ではなく二走目の書き手。意味や構造を変えたくなったら編集へ戻す。"
  close_subagent_after_completion: true
  fallback_draft_label: "補佐くん仮稿"

